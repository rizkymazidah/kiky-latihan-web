<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu Utama</title>
    <style>
      :root {
        --bg1: #f6f1e8;
        --bg2: #e9f0f4;
        --ink: #1c1b1a;
        --accent: #2d5c55;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        color: var(--ink);
        font-family: "Georgia", "Times New Roman", serif;
      }

      .wrap {
        width: min(720px, 92vw);
        background: var(--card);
        padding: 32px 28px;
        border-radius: 16px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
        border: 1px solid rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        letter-spacing: 0.5px;
      }

      p {
        margin: 0 0 18px;
        line-height: 1.5;
      }

      nav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      nav a {
        text-decoration: none;
        color: var(--accent);
        border: 2px solid var(--accent);
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 700;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      nav a:hover {
        background: var(--accent);
        color: #ffffff;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Menu Utama</h1>
      <p>Pilih halaman yang ingin Anda buka.</p>
      <nav>
        <a href="cvkiky.html">Curriculum Vitae</a>
      </nav>
    </main>
  </body>
</html>
